name: Build & Deploy naar Azure

on:
  push:
    branches:
      - main
      - claude/coding-help-NiGFG
  workflow_dispatch:   # handmatig starten via GitHub UI

env:
  ACR_NAME:  acrserviceportaal
  APP_NAME:  serviceportaal
  RG:        rg-serviceportaal
  ENV_NAME:  cae-serviceportaal
  LOCATION:  northeurope

jobs:
  deploy:
    name: Build, push & deploy
    runs-on: ubuntu-latest

    steps:
      # 1. Code ophalen
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Inloggen bij Azure
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 3. Infrastructuur aanmaken als die nog niet bestaat (idempotent)
      - name: Infra bootstrap
        run: |
          az group create \
            --name $RG --location $LOCATION \
            --output none 2>/dev/null || true

          az acr create \
            --name $ACR_NAME --resource-group $RG \
            --sku Basic --admin-enabled true \
            --output none 2>/dev/null || true

          # Maak env aan als die nog niet bestaat
          ENV_STATE=$(az containerapp env show \
            --name $ENV_NAME --resource-group $RG \
            --query "properties.provisioningState" --output tsv 2>/dev/null || echo "NotFound")

          if [ "$ENV_STATE" = "NotFound" ]; then
            echo "Container Apps environment aanmaken..."
            az containerapp env create \
              --name $ENV_NAME --resource-group $RG --location $LOCATION \
              --output none
          fi

          # Wacht tot de environment volledig is ingericht (max 10 minuten)
          echo "Wachten op Container Apps environment..."
          for i in $(seq 1 30); do
            STATE=$(az containerapp env show \
              --name $ENV_NAME --resource-group $RG \
              --query "properties.provisioningState" --output tsv 2>/dev/null || echo "Unknown")
            echo "  Status: $STATE ($i/30)"
            if [ "$STATE" = "Succeeded" ]; then
              echo "Environment klaar."
              break
            fi
            if [ "$STATE" = "Failed" ]; then
              echo "Environment aanmaken mislukt."
              exit 1
            fi
            sleep 20
          done

      # 4. Inloggen bij ACR
      - name: ACR login
        run: az acr login --name $ACR_NAME

      # 5. Docker image bouwen en pushen
      - name: Build & push image
        run: |
          IMAGE="${ACR_NAME}.azurecr.io/${APP_NAME}:${{ github.sha }}"
          IMAGE_LATEST="${ACR_NAME}.azurecr.io/${APP_NAME}:latest"
          docker build -t "$IMAGE" -t "$IMAGE_LATEST" .
          docker push "$IMAGE"
          docker push "$IMAGE_LATEST"
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      # 6. Container App aanmaken of updaten
      - name: Deploy Container App
        run: |
          ACR_USER=$(az acr credential show --name $ACR_NAME --query username --output tsv)
          ACR_PASS=$(az acr credential show --name $ACR_NAME --query "passwords[0].value" --output tsv)

          EXISTS=$(az containerapp show \
            --name $APP_NAME --resource-group $RG \
            --query name --output tsv 2>/dev/null || echo "")

          if [ "$EXISTS" = "$APP_NAME" ]; then
            echo "Updating existing Container App..."
            az containerapp update \
              --name $APP_NAME --resource-group $RG \
              --image "$IMAGE" \
              --output none
          else
            echo "Creating new Container App..."
            az containerapp create \
              --name $APP_NAME \
              --resource-group $RG \
              --environment $ENV_NAME \
              --image "$IMAGE" \
              --registry-server "${ACR_NAME}.azurecr.io" \
              --registry-username "$ACR_USER" \
              --registry-password "$ACR_PASS" \
              --target-port 8080 \
              --ingress external \
              --min-replicas 0 \
              --max-replicas 2 \
              --cpu 0.5 --memory 1.0Gi \
              --env-vars "NODE_ENV=production" "ANTHROPIC_API_KEY=secretref:anthropic-key" \
              --secrets "anthropic-key=${{ secrets.ANTHROPIC_API_KEY }}" \
              --output none
          fi

      # 7. Live URL tonen in workflow summary
      - name: Live URL
        run: |
          FQDN=$(az containerapp show \
            --name $APP_NAME --resource-group $RG \
            --query "properties.configuration.ingress.fqdn" --output tsv)
          echo "## Deployment klaar!" >> $GITHUB_STEP_SUMMARY
          echo "**Live URL:** https://$FQDN" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`$IMAGE\`" >> $GITHUB_STEP_SUMMARY
          echo ""
          echo "Live op: https://$FQDN"
