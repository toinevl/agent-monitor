name: Build & Deploy to Azure Container Apps

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # allows manual trigger from GitHub UI

env:
  ACR_LOGIN_SERVER: acrtvvregistry.azurecr.io
  IMAGE_NAME: acrtvvregistry.azurecr.io/agent-monitor
  CONTAINER_APP_NAME: agent-monitor
  RESOURCE_GROUP: rg-agent-monitor

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run frontend tests
        run: pnpm test

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            BUILD_SHA=${{ github.sha }}

      - name: Deploy to Azure Container Apps
        env:
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
        run: |
          # Set required secrets
          az containerapp secret set \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --secrets \
              push-secret="${{ secrets.PUSH_SECRET }}" \
              beacon-secret="${{ secrets.BEACON_SECRET }}"

          # Set env vars mapping to secrets
          ENV_VARS="PUSH_SECRET=secretref:push-secret BEACON_SECRET=secretref:beacon-secret"

          # Only set Azure Storage if the secret is provided
          if [ -n "$AZURE_STORAGE_CONNECTION_STRING" ]; then
            az containerapp secret set \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --secrets \
                azure-storage-connection-string="$AZURE_STORAGE_CONNECTION_STRING"
            ENV_VARS="$ENV_VARS AZURE_STORAGE_CONNECTION_STRING=secretref:azure-storage-connection-string"
          fi

          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --set-env-vars $ENV_VARS

      - name: Health check
        run: |
          URL=$(az containerapp show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn \
            --output tsv)
          echo "Waiting for deployment to stabilise..."
          sleep 15
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://$URL/api/health")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Deployed to: https://$URL"
              break
            fi
            echo "Health check attempt $i failed (HTTP $STATUS), retrying in 10s..."
            sleep 10
          done
          if [ "$STATUS" != "200" ]; then
            echo "❌ Health check failed after 5 attempts"
            exit 1
          fi

          VERSION_SHA=$(curl -sS "https://$URL/api/version" | python3 -c 'import sys, json; data=json.load(sys.stdin); print(data.get("buildSha", ""))')
          echo "Deployed build SHA: $VERSION_SHA"
          if [ "$VERSION_SHA" != "${{ github.sha }}" ]; then
            echo "❌ Version mismatch: expected ${{ github.sha }}, got $VERSION_SHA"
            exit 1
          fi
          echo "✅ Version endpoint matches commit SHA"
